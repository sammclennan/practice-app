<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Practice App">
        <link rel="stylesheet" href="styles.css">
        <title>Practice App</title>
    </head>
    <body>
        <header>
            <div class="nav-btns hidden">
                <button id="home-btn" class="nav-btn">
                    <svg class="">
                        <use href="#icon-home"></use>
                    </svg>
                </button>
                <button id="pause-btn" class="nav-btn">
                    <svg class="">
                        <use href="#icon-pause"></use>
                    </svg>
                </button>
                <button id="settings-btn" class="nav-btn">
                    <svg class="">
                        <use href="#icon-settings"></use>
                    </svg>
                </button>
            </div>
        </header>
        <div id="select-vocab-interface">
            <div class="content-card">
                <h2>Select Vocab</h2>
                <ul id="vocab-list"></ul> <!-- TODO: Rename? -->
                <button id="start-quiz-btn">Start</button>
                <!-- <button id="start-quiz-btn">Quiz</button> -->
            </div>
        </div>
        <div id="quiz-interface" class="hidden">
            <div class="main-text">
                <div id="sentence-eng" class=""></div>
                <div id="sentence-jp" class="sentence-jp"></div>
            </div>
            <div class="card-nav-controls">
                <button id="prev-card" class="card-nav-btn">
                    <svg class="">
                        <use href="#icon-chevron-left"></use>
                    </svg>
                </button>
                <button id="shuffle-cards" class="card-nav-btn">
                    <svg class="">
                        <use href="#icon-shuffle"></use>
                    </svg>
                </button>
                <button id="next-card" class="card-nav-btn">
                    <svg class="">
                        <use href="#icon-chevron-right"></use>
                    </svg>
                </button>
            </div>
        </div>
        <audio id="eng-audio" src=""></audio>
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
